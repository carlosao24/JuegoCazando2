<!DOCTYPE html>
<html>
 
<head>
  <title>Juego Cazando</title>
  <link rel="stylesheet" href="cazando.css">
</head>
 
<body onload="iniciarJuego();">
 
  <h1>Juego Cazando</h1>
  <p>Autor: Carlos López</p>
 
  <canvas id="juego" width="600" height="400"></canvas>
  <div class="controles">
    <button id="btnArriba" onclick="moverArriba();">⬆</button>
    <br>
    <button id="btnIzquierda" onclick="moverIzquierda();">⬅</button>
    <button id="btnAbajo" onclick="moverAbajo();">⬇</button>
    <button id="btnDerecha" onclick="moverDerecha();">➡</button>
  </div>
 
 
  <div class="panel">
    <span>Puntos: <span id="puntos">0</span></span>
    <span>Tiempo: <span id="tiempo">10</span></span>
  </div>
 
  <p id="mensaje"></p>
  <script src="cazando.js"></script>
</body>
 
</html>
